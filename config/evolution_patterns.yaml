# -*- coding: utf-8 -*-
# 题材演化模式库 - 增强版
# 定义不同类型题材的典型演化阶段和持续时间

evolution_patterns:
  # ═══════════════════════════════════════════════════════════════
  # 新兴产业类演化模式
  # ═══════════════════════════════════════════════════════════════

  疫情类:
    description: "突发公共卫生事件驱动型，从防护到治疗到恢复"
    chain:
      - stage: "防护物资"
        keywords: ["口罩", "防护服", "消毒液", "手套", "熔喷布", "抗原"]
        duration: "爆发后1-2周"
        duration_days: [7, 14]
        typical_stocks: ["振德医疗", "奥美医疗", "英科医疗"]
        stage_type: "supply"

      - stage: "检测诊断"
        keywords: ["检测试剂", "核酸检测", "抗原检测", "体外诊断", "PCR"]
        duration: "2-6周"
        duration_days: [14, 42]
        typical_stocks: ["华大基因", "达安基因", "热景生物"]
        stage_type: "detection"

      - stage: "疫苗研发"
        keywords: ["疫苗", "临床试验", "mRNA", "灭活疫苗", "腺病毒载体"]
        duration: "2-8个月"
        duration_days: [60, 240]
        typical_stocks: ["智飞生物", "康希诺", "沃森生物", "复星医药"]
        stage_type: "treatment"

      - stage: "治疗药物"
        keywords: ["特效药", "治疗药物", "中和抗体", "小分子药", "瑞德西韦", "阿兹夫定"]
        duration: "3-12个月"
        duration_days: [90, 360]
        typical_stocks: ["真实生物", "君实生物"]
        stage_type: "treatment"

      - stage: "复工复产"
        keywords: ["复工复产", "经济恢复", "复商复市", "旅游", "消费"]
        duration: "疫情受控后"
        duration_days: [30, 180]
        typical_stocks: []
        stage_type: "recovery"

  新能源类:
    description: "政策+技术双轮驱动型"
    chain:
      - stage: "政策驱动"
        keywords: ["政策支持", "补贴", "规划", "十四五", "双碳", "碳中和", "顶层设计"]
        duration: "政策后1-3月"
        duration_days: [30, 90]
        typical_stocks: []
        stage_type: "policy"
        catalyst_weight: 1.5

      - stage: "技术突破"
        keywords: ["技术突破", "量产", "成本下降", "能量密度", "效率提升", "降本"]
        duration: "突破后1-6月"
        duration_days: [30, 180]
        typical_stocks: ["宁德时代", "比亚迪", "隆基绿能"]
        stage_type: "technology"

      - stage: "产业化"
        keywords: ["产业化", "规模化", "订单", "产能释放", "量产交付", "扩产"]
        duration: "3-12个月"
        duration_days: [90, 360]
        typical_stocks: ["亿纬锂能", "恩捷股份", "璞泰来"]
        stage_type: "industrialization"

      - stage: "业绩兑现"
        keywords: ["业绩增长", "盈利", "营收增长", "净利润", "财报超预期", "出货量"]
        duration: "规模放量后"
        duration_days: [180, 365]
        typical_stocks: []
        stage_type: "performance"

  固态电池类:
    description: "新能源汽车核心技术创新型"
    chain:
      - stage: "技术突破"
        keywords: ["固态电池", "全固态", "固态电解质", "锂金属负极", "能量密度突破", "安全性"]
        duration: "突破后1-3月"
        duration_days: [30, 90]
        typical_stocks: ["宁德时代", "赣锋锂业", "国轩高科", "清陶能源"]
        stage_type: "technology"
        trl_level: 5

      - stage: "量产准备"
        keywords: ["量产", "生产线", "产能", "中试", "良品率", "工艺", "设备"]
        duration: "6-18月"
        duration_days: [180, 540]
        typical_stocks: ["先导智能", "赢合科技"]
        stage_type: "preparation"
        trl_level: 7

      - stage: "装车验证"
        keywords: ["装车", "配套", "车企", "定点", "验证", "测试", "公告"]
        duration: "量产前后"
        duration_days: [90, 270]
        typical_stocks: ["比亚迪", "蔚来", "上汽"]
        stage_type: "verification"
        trl_level: 8

      - stage: "规模放量"
        keywords: ["放量", "出货", "装机量", "市场份额", "订单", "交付量"]
        duration: "量产后"
        duration_days: [180, 730]
        typical_stocks: []
        stage_type: "scale_up"

  低空经济类:
    description: "政策开放驱动型新兴赛道"
    chain:
      - stage: "政策驱动"
        keywords: ["低空经济", "低空空域", "空域管理", "示范区", "试点", "政策放开"]
        duration: "政策后1-3月"
        duration_days: [30, 90]
        typical_stocks: []
        stage_type: "policy"

      - stage: "产业规划"
        keywords: ["产业规划", "园区", "基地", "招商引资", "产业链布局", "规划"]
        duration: "3-12月"
        duration_days: [90, 360]
        typical_stocks: ["万丰奥威", "中信海直"]
        stage_type: "planning"

      - stage: "技术验证"
        keywords: ["eVTOL", "飞行汽车", "适航认证", "试飞", "商业化验证", "首飞"]
        duration: "6-24月"
        duration_days: [180, 720]
        typical_stocks: ["亿航智能", "峰飞航空"]
        stage_type: "verification"

      - stage: "商业化运营"
        keywords: ["商业运营", "首飞", "载人", "城市空中交通", "UAM", "运营许可"]
        duration: "商业化初期"
        duration_days: [180, 730]
        typical_stocks: []
        stage_type: "commercial"

  AI类:
    description: "技术迭代驱动型，从大模型到应用"
    chain:
      - stage: "技术突破"
        keywords: ["模型突破", "算法革新", "性能提升", "GPT", "大模型", "参数", "benchmark"]
        duration: "突破后1-3月"
        duration_days: [30, 90]
        typical_stocks: ["科大讯飞", "寒武纪", "海光信息", "景嘉微"]
        stage_type: "technology"

      - stage: "生态建设"
        keywords: ["生态", "开发者", "API", "平台", "插件", "开源", "社区"]
        duration: "2-6月"
        duration_days: [60, 180]
        typical_stocks: ["百度", "阿里", "腾讯", "字节跳动"]
        stage_type: "ecosystem"

      - stage: "应用落地"
        keywords: ["应用场景", "商业化", "B端", "C端", "解决方案", "产品", "落地"]
        duration: "3-12月"
        duration_days: [90, 360]
        typical_stocks: []
        stage_type: "application"

      - stage: "业绩兑现"
        keywords: ["收入增长", "用户增长", "付费率", "营收", "盈利", "变现"]
        duration: "规模后"
        duration_days: [180, 730]
        typical_stocks: []
        stage_type: "performance"

  # ═══════════════════════════════════════════════════════════════
