# 题材交叉关联
# ═══════════════════════════════════════════════════════════════

cross_theme_correlations:
  - trigger: "新能源汽车购置税减免"
    leads_to: ["充电桩", "锂电", "零部件", "智能驾驶"]
    correlation: 0.7
    description: "补贴政策带动全产业链"

  - trigger: "AI大模型发布"
    leads_to: ["算力", "AI应用", "数据要素"]
    correlation: 0.9
    description: "大模型发布带动上游算力和下游应用"

  - trigger: "iPhone发布"
    leads_to: ["苹果产业链", "消费电子", "射频", "光学", "散热"]
    correlation: 0.8
    description: "苹果新品带动消费电子全产业链"

  - trigger: "低空经济政策"
    leads_to: ["无人机", "低空基础设施", "低空政策", "eVTOL"]
    correlation: 0.85
    description: "低空经济政策带动全产业链"

  - trigger: "固态电池突破"
    leads_to: ["新能源汽车", "储能", "新材料"]
    correlation: 0.8
    description: "电池技术突破带动新能源和储能"

  - trigger: "华为新品发布"
    leads_to: ["华为产业链", "消费电子", "半导体", "鸿蒙"]
    correlation: 0.85
    description: "华为新品带动全产业链"

